#=============================================================================
#=============================================================================
#Glider ROS 2 system parameters
#=============================================================================
#=============================================================================

#-----------------------------------------------------------------------------
#State Manager Node
#-----------------------------------------------------------------------------
state_manager_node:
  ros__parameters:
    #How long IDLE waits between Iridium comm windows
    idle_iridium_period_s: 100.0

    #Same, but in EMERGENCY state (on surface, controller off)
    emergency_iridium_period_s: 300.0

    #How long to wait for the Iridium modem to settle/acquire signal before starting a send attempt
    iridium_settling_time_s: 60.0

    #Retries per comm window
    iridium_max_attempts: 3

    #Depth below which the glider is considered underwater for emergency surfacing decisions
    surface_depth_m: 1.0

#-----------------------------------------------------------------------------
#Safety Node
#-----------------------------------------------------------------------------
safety_node:
  ros__parameters:
    #Sonar range below which a proximity emergency is triggered
    proximity_threshold_m: 5.0

    #Number of consecutive confident below-threshold readings required before latching the emergency
    proximity_consecutive_count: 3

    #A monitored topic that hasn't published for this long triggers an emergency state
    staleness_threshold_s: 1200.0

#-----------------------------------------------------------------------------
#CAN Bridge Node
#-----------------------------------------------------------------------------
can_bridge_node:
  ros__parameters:
    #SocketCAN interface name
    can_channel: "can0"

    #Rate at which the latest commanded setpoints are re-transmitted to each Teensy 20 Hz 
    republish_rate_hz: 20.0

    #Which actuators participate in the HomeActuators action
    home_vbd_left: true
    home_vbd_right: true
    home_pr: true

#-----------------------------------------------------------------------------
#Sonar Adapter Node
#-----------------------------------------------------------------------------
sonar_adapter_node:
  ros__parameters:
    #Reject readings whose reported confidence is below this percent
    min_confidence: 50.0

    #Moving-average window size
    filter_window: 5

    #Reject a range reading if the last confidence sample is older than this
    confidence_max_age_s: 0.5

#-----------------------------------------------------------------------------
#Telemetry Adapter Node
#-----------------------------------------------------------------------------
telemetry_adapter_node:
  ros__parameters:
    #How often to build and publish a telemetry string on /iridium/sbdwt
    publish_period: 5.0

    #When a field (e.g. GPS) is unavailable, emit "LAT=UNKNOWN" placeholders
    include_unknown_fields: true

#-----------------------------------------------------------------------------
#Pressure Keller Node
#-----------------------------------------------------------------------------
pressure_keller_node:
  ros__parameters:
    #Number of samples averaged at startup (and on /pressure/zero) to fix the
    #atmospheric reference.
    surface_zero_samples: 20

    #Manual fudge factor (m) added on top of the tared depth.
    depth_offset: 0.0

    #fresh water around 1000, sea water around 1029 kg/m^3
    fluid_density: 1000.0

#-----------------------------------------------------------------------------
#IMU MinIMU-9 Driver Node
#-----------------------------------------------------------------------------
imu_minimu_node:
  ros__parameters:
    #Stationary samples averaged at startup (and on /imu/gyro_zero) to fix gyro bias.
    gyro_bias_samples: 250

    #Per-axis variance ceiling (rad^2/s^2); exceeded -> motion assumed, cal restarts.
    gyro_bias_max_var: 0.001

    gyro_publish_during_cal: false

#-----------------------------------------------------------------------------
#IMU Adapter Node
#-----------------------------------------------------------------------------
imu_adapter_node:
  ros__parameters:
    #Measured once on a level surface; subtracted from raw roll/pitch.
    mount_pitch_offset_rad: 0.0
    mount_roll_offset_rad: 0.0

#-----------------------------------------------------------------------------
#Mission Node
#-----------------------------------------------------------------------------
mission_node:
  ros__parameters:
    #"mission" (depth supervisor) or "static" (publish yaml setpoints)
    mode: "mission"

    #set true by state_manager when an Iridium mission arrives, self-clears at depth_upper
    mission_active: false

    #static-mode setpoints
    pitch_setpoint: 0.0     #rad
    roll_setpoint: 0.0      #rad
    vbd_setpoint: 50.0      #percent

    #mission-mode supervisor parameters
    depth_upper: 1.0        #climb to complete trigger (m)
    depth_lower: 5.0        #dive to climb trigger (m), overridden per mission via param service
    alpha_dive: 0.08726646  #5 deg nose-down (rad)
    alpha_rise: -0.08726646 #5 deg nose-up (rad)

    #setpoint smoothing time constants (mission mode only)
    T_alpha_cmd: 2.0
    T_vbd_cmd: 5.0

    #publish rate
    publish_rate_hz: 10.0

#-----------------------------------------------------------------------------
#Controller Node
#-----------------------------------------------------------------------------
controller_node:
  ros__parameters:
    #Control loop rate
    control_rate_hz: 10.0

    #Feature toggles
    enable_roll: true

    #Outer pitch loop on alpha, with D-on-measurement
    Kp_theta: 1.5
    Ti_theta: 750.0
    Td_theta: 20.0

    #Inner pitch-rate loop, back-calculation AW (Tt_q = 0 falls back to Ti_q)
    Kp_q: 0.3
    Ti_q: 3.0
    Tt_q: 0.0

    #Roll (phi) outer loop
    Kp_phi: 0.3
    Ti_phi: 15.0

    #Roll rate (p) inner loop
    Kp_p: 4.0
    Ti_p: 20000.0

    #Rate command limits (rad/s)
    q_cmd_max: 0.13962634   #~8 deg/s
    p_cmd_max: 0.08726646   #~5 deg/s

    #Mass-shift actuator limits (m)
    shift_max_m: 0.0569
    shift_min_m: -0.0569

    #Roll constraint (rad)
    roll_max_rad: 1.5707963  #pi/2

    #Output filter time constants (s)
    shift_cmd_tau: 0.01
    roll_cmd_tau: 5.0

    #Alpha estimator: alpha = theta - gamma, V_h from accelerometer integration
    accel_bias_x: 0.0          #m/s^2, set from a level bench measurement
    depth_rate_tau: 1.0        #s, LPF on finite-diff depth rate
    imu_topic: "/imu/data_raw"

    #true = alpha feedback, false = direct theta feedback (tank/bench/surface).
    #Outer integrator resets on flip.
    use_alpha_feedback: true
